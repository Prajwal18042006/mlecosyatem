<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="/shared/js/theme-init.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Ecosystem | Knowledge Flow Map</title>
    <link rel="stylesheet" href="/shared/css/global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --node-bg: rgba(255, 255, 255, 0.88);
            --node-border: rgba(15, 23, 42, 0.1);
            --node-hover: #0891b2;
            --line-color: rgba(8, 145, 178, 0.2);
        }

        body {
            background: #eef2f7;
            background-image:
                radial-gradient(ellipse 120% 80% at 50% -15%, rgba(8, 145, 178, 0.1), transparent 50%),
                radial-gradient(ellipse 90% 60% at 100% 30%, rgba(99, 102, 241, 0.06), transparent 45%);
            background-attachment: fixed;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Landing Screen */
        #landing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            box-sizing: border-box;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.95) 0%, rgba(238, 242, 247, 0.85) 45%, rgba(226, 232, 240, 0.75) 100%);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .landing-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 100%;
            animation: landing-inner-rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.02s both;
        }

        @keyframes landing-inner-rise {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .landing-title-wrap {
            position: relative;
            display: block;
            max-width: 100%;
            text-align: center;
            margin: 0 0 1.35rem;
            padding: 0 0.75rem;
        }

        .landing-title-wrap::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            width: min(72%, 20rem);
            height: 3px;
            transform: translateX(-50%) scaleX(0);
            transform-origin: center;
            background: linear-gradient(90deg, transparent, rgba(8, 145, 178, 0.9), rgba(99, 102, 241, 0.85), transparent);
            border-radius: 4px;
            opacity: 0;
            animation: landing-underline-draw 1.05s cubic-bezier(0.16, 1, 0.3, 1) 0.72s forwards;
            pointer-events: none;
        }

        @keyframes landing-underline-draw {
            to {
                transform: translateX(-50%) scaleX(1);
                opacity: 1;
            }
        }

        #landing-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.75rem, 8.5vw, 7rem);
            font-weight: 900;
            background: linear-gradient(
                125deg,
                #0f172a 0%,
                #0891b2 22%,
                #818cf8 45%,
                #0891b2 68%,
                #6366f1 88%,
                #0f172a 100%
            );
            background-size: 260% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: clamp(0.08em, 1.8vw, 0.35em);
            cursor: pointer;
            text-align: center;
            margin: 0;
            padding: 0 0 0.35rem;
            line-height: 1.1;
            max-width: 100%;
            word-break: break-word;
            hyphens: auto;
            opacity: 0;
            filter: blur(14px) drop-shadow(0 4px 28px rgba(8, 145, 178, 0.15));
            transform: translateY(36px) scale(0.9);
            animation:
                landing-title-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.08s forwards,
                landing-title-shimmer 9s ease-in-out 1.15s infinite;
            transition: transform 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.55s ease;
        }

        @keyframes landing-title-enter {
            0% {
                opacity: 0;
                filter: blur(16px) drop-shadow(0 4px 20px rgba(8, 145, 178, 0.1));
                transform: translateY(40px) scale(0.88);
            }
            55% {
                opacity: 1;
                filter: blur(0) drop-shadow(0 6px 32px rgba(8, 145, 178, 0.28));
                transform: translateY(-4px) scale(1.02);
            }
            100% {
                opacity: 1;
                filter: blur(0) drop-shadow(0 4px 24px rgba(8, 145, 178, 0.22));
                transform: translateY(0) scale(1);
            }
        }

        @keyframes landing-title-shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        #landing-title:hover {
            filter: blur(0) drop-shadow(0 10px 40px rgba(8, 145, 178, 0.4)) !important;
            transform: scale(1.02);
        }

        .landing-hint {
            font-family: 'Orbitron', sans-serif;
            color: #64748b;
            font-size: clamp(0.65rem, 3.2vw, 0.875rem);
            font-weight: 500;
            text-transform: uppercase;
            text-align: center;
            max-width: 18.5rem;
            width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
            line-height: 1.5;
            letter-spacing: 0.12em;
            text-wrap: balance;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .landing-hint-line {
            display: block;
            opacity: 0;
            transform: translateY(14px);
            filter: blur(6px);
            animation: landing-hint-line-in 0.95s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .landing-hint-line:nth-child(1) {
            animation-delay: 0.78s;
        }

        .landing-hint-line:nth-child(2) {
            animation-delay: 1.02s;
        }

        @keyframes landing-hint-line-in {
            to {
                opacity: 0.94;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .landing-hint-line::after {
            content: '';
            display: block;
            width: 0;
            height: 1px;
            margin: 0.35rem auto 0;
            background: linear-gradient(90deg, transparent, rgba(100, 116, 139, 0.45), transparent);
            animation: landing-hint-rule 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.35s forwards;
        }

        .landing-hint-line:nth-child(2)::after {
            display: none;
        }

        @keyframes landing-hint-rule {
            to { width: min(100%, 12rem); }
        }

        /* Hide main flow until explore; keep navbar usable (theme toggle, links) */
        #navbar-placeholder {
            position: relative;
            z-index: 2500;
        }

        #flow-container, #footer-placeholder {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .show-content #flow-container,
        .show-content #footer-placeholder {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .hide-landing #landing-screen {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(1.1);
        }

        #flow-container {
            position: relative;
            z-index: 1;
            padding: 6.5rem max(1rem, env(safe-area-inset-right)) 3rem max(1rem, env(safe-area-inset-left));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(2rem, 6vw, 3.75rem);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .flow-header {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 0 0.5rem;
            box-sizing: border-box;
        }

        .flow-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 1rem;
            letter-spacing: clamp(0.05em, 1vw, 0.2em);
            line-height: 1.15;
            opacity: 0;
            transform: translateY(26px);
            filter: blur(8px);
        }

        .flow-header p {
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            color: #64748b;
            font-weight: 400;
            line-height: 1.55;
            opacity: 0;
            transform: translateY(18px);
        }

        .show-content .flow-header h1 {
            animation: flow-hero-in 0.95s cubic-bezier(0.16, 1, 0.3, 1) 0.12s forwards;
        }

        .show-content .flow-header p {
            animation: flow-sub-in 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.32s forwards;
        }

        @keyframes flow-hero-in {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes flow-sub-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tree Structure */
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .tree-node {
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            padding: 14px 24px;
            border-radius: 40px;
            color: #0f172a;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 160px;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-transform: uppercase;
        }

        .tree-node:hover {
            border-color: var(--node-hover);
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(8, 145, 178, 0.18);
            background: rgba(255, 255, 255, 0.98);
        }

        .tree-node.root {
            font-size: clamp(0.85rem, 3.5vw, 1.2rem);
            padding: clamp(14px, 3vw, 20px) clamp(20px, 5vw, 45px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(240, 249, 255, 0.92));
            border-color: rgba(8, 145, 178, 0.35);
            margin-bottom: 60px;
        }

        .tree-node.cluster {
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.75);
            margin-bottom: 25px;
            width: 100%;
            max-width: 320px;
            color: #0e7490;
            border-color: rgba(8, 145, 178, 0.35);
        }

        .tree-branch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
            gap: clamp(1.25rem, 4vw, 3rem);
            width: 100%;
            max-width: 100%;
            padding: clamp(0.5rem, 3vw, 1.25rem);
            box-sizing: border-box;
        }

        .tree-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.65);
            padding: clamp(1.25rem, 4vw, 2.2rem);
            border-radius: clamp(16px, 4vw, 30px);
            border: 1px solid rgba(15, 23, 42, 0.08);
            transition: all 0.4s ease;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.06);
        }

        .tree-group:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.92);
            border-color: rgba(8, 145, 178, 0.2);
            box-shadow: 0 16px 48px rgba(15, 23, 42, 0.1);
        }

        .leaf-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 140px), 1fr));
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        .leaf-node {
            font-size: 0.7rem;
            padding: 10px 15px;
            min-width: auto;
            border-radius: 10px;
            background: rgba(248, 250, 252, 0.95);
            font-weight: 500;
            color: #475569;
        }

        .leaf-node:hover {
            color: #0f172a;
            background: #ffffff;
        }

        /* Category Colors */
        .color-basics { border-color: #008080 !important; }
        .color-learning { border-color: #98ff98 !important; }
        .color-data { border-color: #ffa500 !important; }
        .color-stats { border-color: #ffc0cb !important; }
        .color-regression { border-color: #ffff00 !important; }
        .color-classification { border-color: #0000ff !important; }
        .color-clustering { border-color: #00ff00 !important; }
        .color-dim { border-color: #00bcd4 !important; }
        .color-rl { border-color: #ff00ff !important; }
        .color-deep { border-color: #00ffff !important; }
        .color-quantum { border-color: #ffa500 !important; }
        .color-misc { border-color: #800080 !important; }
        .color-resources { border-color: #008080 !important; }

        /* Dark theme — flow map */
        html[data-theme="dark"] {
            --node-bg: rgba(22, 27, 34, 0.85);
            --node-border: rgba(255, 255, 255, 0.12);
            --node-hover: #22d3ee;
        }

        html[data-theme="dark"] body {
            background: #050508;
            background-image:
                radial-gradient(ellipse 120% 80% at 50% -15%, rgba(34, 211, 238, 0.14), transparent 50%),
                radial-gradient(ellipse 90% 60% at 100% 30%, rgba(99, 102, 241, 0.1), transparent 45%);
        }

        html[data-theme="dark"] #landing-screen {
            background: radial-gradient(circle at 50% 40%, rgba(15, 23, 42, 0.95) 0%, rgba(5, 5, 8, 0.98) 70%);
        }

        html[data-theme="dark"] #landing-title {
            background: linear-gradient(
                125deg,
                #f8fafc 0%,
                #22d3ee 25%,
                #a5b4fc 50%,
                #67e8f9 72%,
                #c4b5fd 100%
            );
            background-size: 260% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation:
                landing-title-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.08s forwards,
                landing-title-shimmer 9s ease-in-out 1.15s infinite;
        }

        html[data-theme="dark"] #landing-title:hover {
            filter: blur(0) drop-shadow(0 10px 36px rgba(34, 211, 238, 0.45)) !important;
        }

        html[data-theme="dark"] .landing-title-wrap::after {
            background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.85), rgba(167, 139, 250, 0.8), transparent);
        }

        html[data-theme="dark"] .landing-hint {
            color: #94a3b8;
        }

        html[data-theme="dark"] .flow-header h1 {
            color: #f1f5f9;
        }

        html[data-theme="dark"] .flow-header p {
            color: #94a3b8;
        }

        html[data-theme="dark"] .tree-node {
            color: #e2e8f0;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        }

        html[data-theme="dark"] .tree-node:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(34, 211, 238, 0.12);
        }

        html[data-theme="dark"] .tree-node.root {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
            border-color: rgba(34, 211, 238, 0.45);
        }

        html[data-theme="dark"] .tree-node.cluster {
            background: rgba(255, 255, 255, 0.06);
            color: #67e8f9;
        }

        html[data-theme="dark"] .tree-group {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        html[data-theme="dark"] .tree-group:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(34, 211, 238, 0.25);
        }

        html[data-theme="dark"] .leaf-node {
            background: rgba(0, 0, 0, 0.35);
            color: #94a3b8;
        }

        html[data-theme="dark"] .leaf-node:hover {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.1);
        }

        @media (prefers-reduced-motion: reduce) {
            .landing-inner,
            #landing-title,
            .landing-title-wrap::after,
            .landing-hint-line,
            .landing-hint-line::after,
            .show-content .flow-header h1,
            .show-content .flow-header p {
                animation: none !important;
            }

            .landing-inner,
            #landing-title,
            .landing-hint-line,
            .flow-header h1,
            .flow-header p {
                opacity: 1 !important;
                transform: none !important;
                filter: none !important;
            }

            .landing-title-wrap::after {
                transform: translateX(-50%) scaleX(1) !important;
                opacity: 0.85 !important;
            }

            #landing-title {
                background-position: 50% 50% !important;
            }
        }

        @media (max-width: 640px) {
            #landing-title:hover {
                transform: none;
            }
            .tree-node {
                font-size: 0.68rem;
                padding: 12px 16px;
                min-width: 0;
                width: 100%;
                max-width: 100%;
            }
            .tree-node.cluster {
                max-width: 100%;
            }
            .leaf-node {
                font-size: 0.62rem;
                padding: 8px 10px;
            }
        }

    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div id="bg-canvas"></div>

    <div id="landing-screen">
        <div class="landing-inner">
            <div class="landing-title-wrap">
                <h1 id="landing-title">ML ECOSYSTEM</h1>
            </div>
            <p id="landing-subtitle" class="landing-hint">
                <span class="landing-hint-line">CLICK TO EXPLORE</span>
                <span class="landing-hint-line">THE KNOWLEDGE FLOW</span>
            </p>
        </div>
    </div>

    <main id="flow-container">
        <div class="flow-header">
            <h1>Machine Learning Flow</h1>
            <p>A structured journey through the ML ecosystem. Click any topic to explore.</p>
        </div>

        <div id="tree-root" class="tree">
            <!-- Root Node -->
            <a href="/index.html" class="tree-node root">ML ECOSYSTEM HOME</a>
            
            <div class="tree-branch-grid" id="main-branches">
                <!-- Main categories will be injected here -->
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/shared/js/navbar.js"></script>
    <script src="/shared/js/background-animation.js"></script>
    <script>

            document.body.classList.add('show-content', 'hide-landing');
        }
        document.getElementById('landing-title').addEventListener('click', dismissLanding);
        document.getElementById('landing-subtitle').addEventListener('click', dismissLanding);

        // Foreground Tree Content Injection
        const treeData = [
            {
                title: 'Basics & Intro',

                topics: [
                    { title: 'Home', link: '/index.html' },

                    { title: 'Getting Started', link: '/topics/getting-started.html' },
                    { title: 'Basic Concepts', link: '/topics/basic-concepts.html' },
                    { title: 'Ecosystem', link: '/topics/ecosystem.html' },

                ]
            },
            {
                title: 'Data Mastery',

                topics: [

                    { title: 'Categorical Data', link: '/topics/categorical-data.html' },

                    { title: 'Data Understanding', link: '/topics/data-understanding.html' },
                    { title: 'Data Preparation', link: '/topics/data-preparation.html' },
                    { title: 'Models', link: '/topics/models.html' },
                    { title: 'Types of Data', link: '/topics/types-of-data.html' },
                    { title: 'Data Scaling', link: '/topics/data-scaling.html' }
                ]
            },
            {

                topics: [

                    { title: 'Histograms', link: '/topics/histograms.html' },
                    { title: 'Density Plots', link: '/topics/density-plots.html' },
                    { title: 'Box Plots', link: '/topics/box-plots.html' },
                    { title: 'Correlation Matrix', link: '/topics/correlation-matrix.html' },
                    { title: 'Scatter Matrix', link: '/topics/scatter-matrix.html' },
                    { title: 'Statistics', link: '/topics/statistics.html' },
                    { title: 'Mean, Median, Mode', link: '/topics/mean-median-mode.html' },
                    { title: 'Standard Deviation', link: '/topics/standard-deviation.html' },
                    { title: 'Percentiles', link: '/topics/percentiles.html' },

            group.className = 'tree-group';
            group.style.animation = `fadeInUp 0.8s ease-out ${bIndex * 0.1}s forwards`;
            group.style.opacity = '0';
            
            const clusterNode = document.createElement('div');
            clusterNode.className = `tree-node cluster ${branch.class}`;
            clusterNode.textContent = branch.title;
            
            const leafContainer = document.createElement('div');
            leafContainer.className = 'leaf-container';
            
            branch.topics.forEach((topic, tIndex) => {
                const leaf = document.createElement('a');
                leaf.href = topic.link;
                leaf.className = `tree-node leaf-node ${branch.class}`;
                leaf.textContent = topic.title;
                leaf.style.animation = `fadeInUp 0.5s ease-out ${(bIndex * 0.1) + (tIndex * 0.05)}s forwards`;

                leafContainer.appendChild(leaf);
            });
            
            group.appendChild(clusterNode);
            group.appendChild(leafContainer);
            branchesContainer.appendChild(group);
